<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Domain Parking</title>
    <style>
        body { 
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        .container { 
            text-align: center; 
            padding: 40px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .icon {
            font-size: 48px;
            margin-bottom: 20px;
            opacity: 0.6;
        }
        .title { 
            font-size: 24px; 
            font-weight: 300;
            margin-bottom: 15px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        .domain {
            font-size: 18px;
            color: #888;
            margin-bottom: 25px;
            font-family: 'Courier New', monospace;
        }
        .note { 
            font-size: 12px; 
            color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🅿️</div>
        <div class="title">Domain Parking</div>
        <div class="domain">this domain may be for sale</div>
        <div class="note">contact domain registrar for more information</div>
    </div>
</body>
</html>
